<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device width, initial-scale =1.0" />
    <title>Login Form</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="form-container">
        <div class="form-blob">
          <!--<img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--1"
          />
          <img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--1"
          />
          <img
            src="assets/images/blob.svg"
            alt="blob"
            class="blob-image blob-image--1"
          />-->
        </div>

        <div class="form-header">
          <p>Please enter your details</p>
          <h1>Welcome Back</h1>
        </div>

        <form class="form-box">
          <div class="input-group">
            <input
              type="email"
              id="email"
              class="input-field"
              placeholder=""
              required
            />
            <label for="email" class="floating-label"> Email address</label>
          </div>

          <div class="input-group">
            <input
              type="password"
              id="password"
              class="input-field"
              placeholder=""
              required
            />
            <label for="password" class="floating-label">password</label>
            <div class="eye-icon">p</div>
          </div>

          <div class="input-group checkbox-group">
            <div class="form-col remember-me">
              <input
                type="checkbox"
                id="remember-me-checkbox"
                class="checkbox-field"
              />
              <label for="remember-me-checkbox">Remember me</label>
            </div>

            <div class="form-col">
              <a href="#" class="form-link">Forgot password?</a>
            </div>
            <button type="submit" class="form-btn--submit">Sign In</button>
          </div>
        </form>
        <div class="form-button">
          <div class="form-socials">
            <button class="form-btn form-btn--social">
              <img
                src="assets/images/google.svg"
                class="btn-icon"
                alt="social icon"
              />
            </button>

            <button class="form-btn form-btn--social">
              <img
                src="assets/images/facebook.svg"
                class="btn-icon"
                alt="social icon"
              />
            </button>

            <button class="form-btn form-btn--social">
              <img
                src="assets/images/apple.svg"
                class="btn-icon"
                alt="social icon"
              />
            </button>
          </div>
          <p>
            Don't have an account? <a href="#" class="form-link">Sign Up</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
